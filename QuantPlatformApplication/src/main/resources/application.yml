spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

  kafka:
    enabled: false
  application.name: QuantPlatformApplication
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/postgres
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate           # Flyway manages DDL — Hibernate only validates
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.batch_size: 50

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0            # Run all migrations (V1, V2, ...)
    locations: classpath:db/migration

  redis:
    host: ${REDIS_HOST:localhost}
    port: 6379

  task:
    scheduling:
      pool:
        size: 5

jwt:
  secret: dGhpcyBpcyBhIHZlcnkgc2VjdXJlIHNlY3JldCBrZXkgZm9yIGp3dCBzaWduaW5n
  expiration: 86400000

# External API configuration
yahoo:
  finance:
    base-url: https://query1.finance.yahoo.com

fred:
  api-key: ${FRED_API_KEY:DEMO_KEY}
  base-url: https://api.stlouisfed.org

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always