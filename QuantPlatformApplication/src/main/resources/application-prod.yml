# Production profile — uses environment variables for all secrets
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME:quantdb}
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: quant-platform
      auto-offset-reset: earliest

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized

server:
  port: 8080

logging:
  level:
    root: WARN
    com.QuantPlatformApplication: INFO
