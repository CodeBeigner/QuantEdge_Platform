apiVersion: apps/v1
kind: Deployment
metadata:
  name: quant-platform
  labels:
    app: quant-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quant-platform
  template:
    metadata:
      labels:
        app: quant-platform
    spec:
      containers:
        - name: quant-platform
          image: quant-platform:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prod
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: quant-secrets
                  key: db-host
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: quant-secrets
                  key: db-user
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: quant-secrets
                  key: db-pass
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: quant-secrets
                  key: jwt-secret
            - name: REDIS_HOST
              value: redis-service
            - name: KAFKA_BOOTSTRAP
              value: kafka-service:9092
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: quant-platform-service
spec:
  selector:
    app: quant-platform
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
