<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantEdge — AI Trading Platform</title>
    <meta name="description"
        content="AI-driven quantitative trading platform. Real market data, strategy execution, backtesting, and portfolio management.">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- React (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>

    <!-- Recharts (CDN) -->
    <script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>

    <!-- WebSocket: SockJS + STOMP -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
</head>

<body>
    <div id="root"></div>

    <!-- Application Scripts (order matters) -->
    <script src="js/api.js"></script> <!-- API client -->
    <script src="js/data.js"></script> <!-- Data generators (fallback) -->
    <script src="js/modules.js"></script> <!-- React module components -->
    <script src="js/app.js"></script> <!-- Root App + mount -->
</body>

</html>
